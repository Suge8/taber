<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Taber Print</title>
    <style>
      body { max-width: 48rem; margin: 2rem auto; padding: 0 1.5rem; font: 15px/1.65 -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: #111; }
      h1, h2, h3 { line-height: 1.3; }
      pre, code { font-family: ui-monospace, Consolas, monospace; background: #f5f5f5; border-radius: 4px; }
      pre { padding: 0.75rem; overflow-x: auto; }
      code { padding: 0.1em 0.3em; }
      table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
      th, td { border: 1px solid #d1d5db; padding: 0.4rem 0.6rem; text-align: left; }
      blockquote { border-left: 3px solid #d1d5db; margin-left: 0; padding-left: 1rem; color: #4b5563; }
      img { max-width: 100%; }
      @media print { body { margin: 0; max-width: none; } }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <script type="module" src="./print/main.ts"></script>
  </body>
</html>
